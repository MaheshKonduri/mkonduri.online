<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="mkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c9a96e"/>
      <stop offset="50%" style="stop-color:#e8d5a3"/>
      <stop offset="100%" style="stop-color:#c9a96e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Outer diamond frame -->
  <rect x="30" y="30" width="140" height="140" rx="4" fill="none" stroke="url(#mkGrad)" stroke-width="1.2" transform="rotate(45 100 100)"/>
  <!-- Diamond corner dots -->
  <circle cx="100" cy="2" r="3" fill="url(#mkGrad)" opacity="0.8"/>
  <circle cx="198" cy="100" r="3" fill="url(#mkGrad)" opacity="0.8"/>
  <circle cx="100" cy="198" r="3" fill="url(#mkGrad)" opacity="0.8"/>
  <circle cx="2" cy="100" r="3" fill="url(#mkGrad)" opacity="0.8"/>
  <!-- Inner circle -->
  <circle cx="100" cy="100" r="60" fill="none" stroke="url(#mkGrad)" stroke-width="0.8" opacity="0.5"/>
  <!-- Decorative dashed ring -->
  <circle cx="100" cy="100" r="55" fill="none" stroke="url(#mkGrad)" stroke-width="0.4" stroke-dasharray="2 4" opacity="0.3"/>
  <!-- M Letter -->
  <path d="M 62 130 L 62 72 L 78 105 L 92 76 L 106 105 L 92 76" fill="none" stroke="url(#mkGrad)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <!-- K Letter -->
  <path d="M 110 130 L 110 72" fill="none" stroke="url(#mkGrad)" stroke-width="3.5" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M 110 100 L 138 72" fill="none" stroke="url(#mkGrad)" stroke-width="3.5" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M 110 100 L 138 130" fill="none" stroke="url(#mkGrad)" stroke-width="3.5" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Separator line -->
  <line x1="70" y1="140" x2="130" y2="140" stroke="url(#mkGrad)" stroke-width="1" opacity="0.5" stroke-linecap="round"/>
  <!-- Corner accents -->
  <line x1="40" y1="45" x2="55" y2="45" stroke="url(#mkGrad)" stroke-width="0.8" opacity="0.4"/>
  <line x1="40" y1="45" x2="40" y2="60" stroke="url(#mkGrad)" stroke-width="0.8" opacity="0.4"/>
  <line x1="160" y1="45" x2="145" y2="45" stroke="url(#mkGrad)" stroke-width="0.8" opacity="0.4"/>
  <line x1="160" y1="45" x2="160" y2="60" stroke="url(#mkGrad)" stroke-width="0.8" opacity="0.4"/>
  <line x1="40" y1="155" x2="55" y2="155" stroke="url(#mkGrad)" stroke-width="0.8" opacity="0.4"/>
  <line x1="40" y1="155" x2="40" y2="140" stroke="url(#mkGrad)" stroke-width="0.8" opacity="0.4"/>
  <line x1="160" y1="155" x2="145" y2="155" stroke="url(#mkGrad)" stroke-width="0.8" opacity="0.4"/>
  <line x1="160" y1="155" x2="160" y2="140" stroke="url(#mkGrad)" stroke-width="0.8" opacity="0.4"/>
</svg>
